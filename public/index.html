<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DogTech - Sistema de Autenticación</title>
  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-success: #16a34a;
      --color-success-bg: #dcfce7;
      --color-error: #dc2626;
      --color-error-bg: #fee2e2;
      --color-bg: #f1f5f9;
      --color-surface: #ffffff;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --color-border-focus: #93c5fd;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--color-bg); color: var(--color-text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .auth-container { background: var(--color-surface); border-radius: var(--radius); box-shadow: var(--shadow); width: 100%; max-width: 420px; padding: 2.5rem; }
    .app-header { text-align: center; margin-bottom: 2rem; }
    .app-header h1 { font-size: 1.6rem; font-weight: 700; color: #1e293b; }
    .tab-bar { display: flex; border-bottom: 2px solid var(--color-border); margin-bottom: 1.75rem; }
    .tab-btn { flex: 1; background: none; border: none; padding: 0.75rem; cursor: pointer; font-size: 0.95rem; font-weight: 600; color: var(--color-text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s; }
    .tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .form-section { display: none; }
    .form-section.active { display: block; }
    .field-group { margin-bottom: 1.1rem; }
    .field-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.35rem; }
    .password-wrapper { position: relative; display: flex; align-items: center; }
    .field-group input { width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid var(--color-border); border-radius: 7px; outline: none; background: #f8fafc; }
    .field-group input:focus { border-color: var(--color-primary); background: #fff; }
    .toggle-password { position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: var(--color-text-muted); }
    .btn-submit { width: 100%; padding: 0.75rem; background: var(--color-primary); color: #fff; border: none; border-radius: 7px; font-weight: 700; cursor: pointer; margin-top: 0.5rem; }
    .btn-submit:hover { background: var(--color-primary-dark); }
    .alert { display: none; padding: 0.75rem; border-radius: 7px; font-size: 0.9rem; margin-top: 1rem; text-align: center; }
    .alert.success { display: block; background: var(--color-success-bg); color: var(--color-success); }
    .alert.error { display: block; background: var(--color-error-bg); color: var(--color-error); }
    .form-footer { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; }
    .form-footer a { color: var(--color-primary); cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="app-header">
      <h1>🐾 DogTech</h1>
      <p>Gestión de Acceso - Evidencia GA7</p>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="mostrarTab('login')">Iniciar sesión</button>
      <button class="tab-btn" id="tab-registro" onclick="mostrarTab('registro')">Registrarse</button>
    </div>

    <div class="form-section active" id="seccion-login">
      <div class="field-group">
        <label>Correo electrónico</label>
        <input type="email" id="login-email" placeholder="santi@mail.com" />
      </div>
      <div class="field-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="Tu contraseña" />
      </div>
      <button class="btn-submit" id="btn-login" onclick="iniciarSesion()">Ingresar</button>
      <div class="alert" id="mensaje-login"></div>
      <p class="form-footer">¿No tienes cuenta? <a onclick="mostrarTab('registro')">Regístrate aquí</a></p>
    </div>

    <div class="form-section" id="seccion-registro">
      <div class="field-group"><label>Nombre completo</label><input type="text" id="reg-nombre" /></div>
      <div class="field-group"><label>Correo electrónico</label><input type="email" id="reg-email" /></div>
      <div class="field-group"><label>Contraseña</label><input type="password" id="reg-password" /></div>
      <div class="field-group"><label>Confirmar contraseña</label><input type="password" id="reg-password2" /></div>
      <button class="btn-submit" id="btn-registro" onclick="registrarUsuario()">Crear cuenta</button>
      <div class="alert" id="mensaje-registro"></div>
      <p class="form-footer">¿Ya tienes cuenta? <a onclick="mostrarTab('login')">Inicia sesión aquí</a></p>
    </div>
  </div>

  <script>
    const API_URL = 'https://dogtech-backend.onrender.com';

    function mostrarTab(tab) {
      document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('seccion-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    function mostrarMensaje(id, texto, tipo) {
      const el = document.getElementById(id);
      el.textContent = texto;
      el.className = 'alert ' + tipo;
    }

    async function registrarUsuario() {
      const nombre = document.getElementById('reg-nombre').value.trim();
      const correo = document.getElementById('reg-email').value.trim();
      const contrasena = document.getElementById('reg-password').value;
      const contrasena2 = document.getElementById('reg-password2').value;
      const btn = document.getElementById('btn-registro');

      if (!nombre || !correo || !contrasena) return mostrarMensaje('mensaje-registro', '⚠️ Todos los campos son obligatorios.', 'error');
      if (contrasena !== contrasena2) return mostrarMensaje('mensaje-registro', '⚠️ Las contraseñas no coinciden.', 'error');

      btn.disabled = true;
      btn.textContent = 'Procesando...';

      try {
        const respuesta = await fetch(`${API_URL}/registrar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, correo, contrasena })
        });
        const datos = await respuesta.json();
        if (respuesta.ok) {
          mostrarMensaje('mensaje-registro', '✅ ' + datos.mensaje, 'success');
          setTimeout(() => mostrarTab('login'), 2000);
        } else {
          mostrarMensaje('mensaje-registro', '⚠️ ' + datos.error, 'error');
        }
      } catch (error) {
        mostrarMensaje('mensaje-registro', '❌ Error de conexión con el servidor.', 'error');
      } finally { btn.disabled = false; btn.textContent = 'Crear cuenta'; }
    }

    async function iniciarSesion() {
      const correo = document.getElementById('login-email').value.trim();
      const contrasena = document.getElementById('login-password').value;
      const btn = document.getElementById('btn-login');

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      try {
        const respuesta = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo, contrasena })
        });
        const datos = await respuesta.json();
        if (respuesta.ok) mostrarMensaje('mensaje-login', '✅ ' + datos.mensaje, 'success');
        else mostrarMensaje('mensaje-login', '⚠️ ' + datos.error, 'error');
      } catch (error) {
        mostrarMensaje('mensaje-login', '❌ Error de conexión.', 'error');
      } finally { btn.disabled = false; btn.textContent = 'Ingresar'; }
    }
  </script>
</body>
</html>
